<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Visitor Log Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Visitor Log</h1>
      <div class="controls">
        <label>Start <input type="datetime-local" id="start" /></label
        ><label>End <input type="datetime-local" id="end" /></label
        ><button id="refresh">Refresh</button
        ><label class="file"
          >Import Udemy CSV <input type="file" id="csv" accept=".csv" /></label
        ><span id="importStatus"></span>
      </div>
    </header>
    <section class="tiles" id="tiles"></section>
    <section>
      <h2>Top Pages</h2>
      <table id="pages">
        <thead>
          <tr>
            <th>Path</th>
            <th>Views</th>
            <th>Udemy Clicks</th>
            <th>Orders</th>
            <th>Net Revenue</th>
            <th>CR %</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
    <section class="two-col">
      <div>
        <h2>Coupons & Courses</h2>
        <table id="coupons">
          <thead>
            <tr>
              <th>Coupon</th>
              <th>Course</th>
              <th>Clicks</th>
              <th>Orders</th>
              <th>Net</th>
              <th>CR %</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div>
        <h2>Locations</h2>
        <table id="locations">
          <thead>
            <tr>
              <th>Country</th>
              <th>Region</th>
              <th>Visitors</th>
              <th>Sessions</th>
              <th>Views</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
    <div id="detailModal" class="modal hidden">
      <div class="modal-content">
        <h2>Details for <span id="detailPath"></span></h2>
        <table id="detailTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Event</th>
              <th>Referrer</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <button id="detailClose">Close</button>
      </div>
    </div>
    <footer><small>tglauner.com — internal analytics (SQLite)</small></footer>
    <script src="./app.js"></script>
  </body>
</html>
